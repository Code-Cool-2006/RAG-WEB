services:
  - type: web
    name: notebook-rag
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PERSISTENT_STORAGE_PATH
        value: /opt/render/project/src/persistent_data
    disk:
      name: rag-storage
      mountPath: /opt/render/project/src/persistent_data
      sizeGB: 1
